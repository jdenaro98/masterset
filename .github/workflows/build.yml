name: Build Release

# Triggers:
#   - Push a tag like v1.2.3  → automatic release build
#   - "Run workflow" button in GitHub Actions UI → manual on-demand build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: masterset-macOS
            artifact-path: dist/*.dmg
            electron-cmd: npx electron-builder --mac --publish never
          - os: windows-latest
            artifact-name: masterset-Windows
            artifact-path: dist/*.zip
            electron-cmd: npx electron-builder --win --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w node-pty

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyinstaller playwright requests

      # Cache the ~150 MB Chromium download between workflow runs
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/ms-playwright
            ~/.cache/ms-playwright
            ${{ env.LOCALAPPDATA }}/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: playwright install chromium

      # ── Python backend bundle ─────────────────────────────────────────────
      - name: Bundle Python backend (PyInstaller)
        run: pyinstaller backend_server.spec --distpath dist --workpath build/pyinstaller --noconfirm

      # ── Copy Playwright Chromium into backend bundle ──────────────────────────
      - name: Copy Playwright Chromium into backend bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run copy:playwright:mac

      - name: Copy Playwright Chromium into backend bundle (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run copy:playwright:win

      # ── Electron app ──────────────────────────────────────────────────────
      - name: Build Electron app
        run: ${{ matrix.electron-cmd }}
        env:
          # Ad-hoc signing ("-" identity) is used — no Apple Developer cert.
          # App will run on Apple Silicon but Gatekeeper will still block
          # downloads unless the user right-clicks > Open or runs:
          #   xattr -dr com.apple.quarantine /Applications/masterset.app
          # For notarized releases, set CSC_LINK + CSC_KEY_PASSWORD as
          # encrypted repo secrets and remove CSC_IDENTITY_AUTO_DISCOVERY.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Upload installer as a workflow artifact ────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/**/*
