<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000000; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
    .xterm-viewport { overflow-y: hidden !important; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script>
    const { ipcRenderer } = require('electron');
    const { Terminal }    = require('xterm');
    const { FitAddon }    = require('xterm-addon-fit');

    const term = new Terminal({
      cols: 160,
      rows: 50,
      theme: {
        background:          '#000000',
        foreground:          '#ffffff',
        cursor:              'transparent',
        cursorAccent:        'transparent',
        selectionBackground: 'rgba(255,255,255,0.25)',
        black:        '#000000', brightBlack:   '#555555',
        red:          '#cc0000', brightRed:     '#ff5555',
        green:        '#00cc00', brightGreen:   '#55ff55',
        yellow:       '#cccc00', brightYellow:  '#ffff55',
        blue:         '#0000cc', brightBlue:    '#5555ff',
        magenta:      '#cc00cc', brightMagenta: '#ff55ff',
        cyan:         '#00cccc', brightCyan:    '#55ffff',
        white:        '#cccccc', brightWhite:   '#ffffff',
      },
      fontFamily:      '"Cascadia Code", "Fira Code", "Courier New", monospace',
      fontSize:        13,
      lineHeight:      1.0,
      cursorStyle:     'bar',
      cursorBlink:     false,
      scrollback:      0,
      allowProposedApi: true,
    });

    const fitAddon = new FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    term.focus();
    window.addEventListener('focus', () => term.focus());


    // Wire up PTY I/O immediately — data can start flowing before the window resize
    ipcRenderer.on('pty-data', (_, data) => term.write(data));
    term.onData(data => ipcRenderer.send('pty-input', data));
    // onBinary handles DEFAULT-encoded mouse events (fallback if SGR mode isn't negotiated)
    term.onBinary(data => ipcRenderer.send('pty-input', data));
    term.onResize(({ cols, rows }) => ipcRenderer.send('pty-resize', { cols, rows }));

    // Wait for xterm to render at 160×50, measure its pixel footprint,
    // then ask the main process to resize the window to match exactly.
    // Only after that do we start following window-resize events with FitAddon,
    // so the initial 160×50 is never overridden by the wrong window size.
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const xtermScreen = document.querySelector('.xterm-screen');
      if (xtermScreen) {
        const { width, height } = xtermScreen.getBoundingClientRect();
        ipcRenderer.send('fit-to-terminal', { width: Math.ceil(width), height: Math.ceil(height) });
      }

      // After this point, let FitAddon adapt the terminal to any user-driven window resizes
      const ro = new ResizeObserver(() => fitAddon.fit());
      ro.observe(document.getElementById('terminal'));
    }));
  </script>
</body>
</html>
